services:
  postgres:
    image: postgres:17.9-bookworm
    container_name: tooth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tooth
      POSTGRES_USER: tooth
      POSTGRES_PASSWORD: tooth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
